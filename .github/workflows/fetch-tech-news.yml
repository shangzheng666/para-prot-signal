name: Fetch Tech News
on:
  schedule:
    - cron: "30 0 * * *"   # UTC 00:30 = 北京时间 08:30，在 PubMed 之后运行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch tech news
        run: python scripts/fetch_tech_news.py --days 3

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tech-news-data.js tech-news-data.md
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update tech news $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Build & send daily briefing via PushPlus
        run: |
          python -c "
          import json, re, os, urllib.request, urllib.parse

          # ── PubMed stats ──
          pub_count = 0
          pub_topics = ''
          try:
              text = open('research-data.js', encoding='utf-8').read()
              m = re.search(r'window\.researchItems\s*=\s*(\[.*\])', text, re.DOTALL)
              if m:
                  items = json.loads(m.group(1))
                  pub_count = len(items)
                  tc = {}
                  for it in items:
                      for t in it.get('topics', []):
                          tc[t] = tc.get(t, 0) + 1
                  pub_topics = '、'.join(f'{t} {n} 篇' for t, n in tc.items())
          except Exception:
              pass

          # ── Tech news stats ──
          tech_count = 0
          tech_cats = ''
          highlights_md = ''
          try:
              text = open('tech-news-data.js', encoding='utf-8').read()
              m = re.search(r'window\.techNewsItems\s*=\s*(\[.*\])', text, re.DOTALL)
              if m:
                  items = json.loads(m.group(1))
                  tech_count = len(items)
                  cc = {}
                  for it in items:
                      cc[it.get('category', '')] = cc.get(it.get('category', ''), 0) + 1
                  tech_cats = '、'.join(f'{c} {n} 条' for c, n in cc.items())
                  # Pick up to 5 highlights (non-ArXiv first)
                  non_arxiv = [it for it in items if 'ArXiv' not in it.get('source', '')]
                  picks = non_arxiv[:5] if len(non_arxiv) >= 5 else non_arxiv + items[:5 - len(non_arxiv)]
                  seen = set()
                  lines = []
                  for it in picks:
                      if it['title'] not in seen:
                          seen.add(it['title'])
                          lines.append(f'- **[{it.get(\"source\",\"\")}]** [{it[\"title\"]}]({it.get(\"link\",\"\")})')
                  highlights_md = chr(10).join(lines)
          except Exception:
              pass

          total = pub_count + tech_count
          if total == 0:
              print('No items, skip notification.')
              raise SystemExit(0)

          title = f'每日科研简报 — 文献 {pub_count} 篇 · 资讯 {tech_count} 条'

          parts = [f'今日共收录 **{total}** 条内容。', '']

          if pub_count:
              parts.append(f'## 📚 PubMed 文献')
              parts.append(f'{pub_count} 篇（{pub_topics}）')
              parts.append(f'')
              parts.append(f'[在线查看 →](https://shzzzayys.github.io/para-prot-signal/)')
              parts.append('')

          if tech_count:
              parts.append(f'## 🔬 AI & 半导体资讯')
              parts.append(f'{tech_count} 条（{tech_cats}）')
              parts.append(f'')
              parts.append(f'[在线查看 →](https://shzzzayys.github.io/para-prot-signal/tech-news.html)')
              parts.append('')
              if highlights_md:
                  parts.append('## 📌 今日要闻')
                  parts.append(highlights_md)
                  parts.append('')

          parts.append('---')
          parts.append('*para.prot.signal · 自动简报*')
          content = chr(10).join(parts)

          # ── Send via PushPlus ──
          token = os.environ.get('PUSHPLUS_TOKEN', '')
          if not token:
              print('PUSHPLUS_TOKEN not set, skip.')
              raise SystemExit(0)

          payload = json.dumps({
              'token': token,
              'title': title,
              'content': content,
              'template': 'markdown',
          }).encode('utf-8')

          req = urllib.request.Request(
              'http://www.pushplus.plus/send',
              data=payload,
              headers={'Content-Type': 'application/json'},
          )
          with urllib.request.urlopen(req, timeout=15) as resp:
              result = json.loads(resp.read().decode('utf-8'))
              print(f'PushPlus response: {result}')
              if result.get('code') != 200:
                  print(f'Warning: PushPlus returned code {result.get(\"code\")}')
                  raise SystemExit(1)
          print('Briefing sent successfully.')
          "
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
